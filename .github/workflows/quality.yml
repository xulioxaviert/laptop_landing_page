name: Code Quality Checks

on:
  pull_request:
    branches: [ master, main ]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run StyleLint on CSS
        uses: nosir/github-action-stylelint@v12.1.0
        with:
          files: style.css
        continue-on-error: true

      - name: Check file sizes
        run: |
          echo "📊 File sizes:"
          du -h index.html style.css
          echo ""
          echo "📁 Directory structure:"
          find . -type f ! -path './.git/*' ! -path './.github/*' ! -path './.vscode/*' | head -20
